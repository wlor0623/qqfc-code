<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QQ飞车道具代码查询</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<script>
 
</script>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-white">
    <div id="app" class="container mx-auto max-w-7xl px-4 py-8">
        <h1 class="mb-8 text-center text-4xl font-bold text-transparent bg-gradient-to-r from-blue-400 to-cyan-300 bg-clip-text">
            QQ飞车道具代码查询
        </h1>

        <div class="mb-8 rounded-2xl border border-slate-700 bg-slate-800/90 p-6 shadow-lg">
            <div class="grid grid-cols-1 gap-6 md:grid-cols-4">
                <div class="md:col-span-2">
                    <label class="mb-2 block text-sm font-medium text-gray-300">搜索道具</label>
                    <input
                        v-model="searchText"
                        type="text"
                        placeholder="输入代码、道具名称..."
                        class="w-full rounded-xl border border-slate-600 bg-slate-700 px-4 py-3 transition-colors duration-150 focus:border-transparent focus:ring-2 focus:ring-blue-500"
                    />
                </div>

                <div>
                    <label class="mb-2 block text-sm font-medium text-gray-300">道具类型</label>
                    <select
                        v-model="selectedType"
                        class="w-full rounded-xl border border-slate-600 bg-slate-700 px-4 py-3 transition-colors duration-150 focus:border-transparent focus:ring-2 focus:ring-blue-500"
                    >
                        <option value="">全部类型</option>
                        <option v-for="type in types" :key="type" :value="type">{{ type }}</option>
                    </select>
                </div>

                <div class="flex items-end">
                    <button
                        @click="resetFilters"
                        class="w-full rounded-xl bg-gradient-to-r from-red-500 to-pink-500 px-6 py-3 font-medium shadow transition-colors duration-150 hover:from-red-600 hover:to-pink-600"
                    >
                        重置筛选
                    </button>
                </div>
            </div>

            <div class="mt-4 flex flex-col gap-3 text-sm text-gray-400 md:flex-row md:items-center md:justify-between">
                <div class="flex flex-wrap items-center gap-4">
                    <span>
                        共 <span class="font-semibold text-cyan-300">{{ totalItems }}</span> 个道具
                    </span>
                    <span>
                        当前匹配 <span class="font-semibold text-blue-400">{{ totalFiltered }}</span> 个
                    </span>
                    <span>
                        第 <span class="font-semibold text-white">{{ currentPage }}</span> / {{ totalPages }} 页
                    </span>
                </div>
                <div class="flex items-center gap-4">
                    <label class="flex items-center gap-2">
                        <span>每页</span>
                        <select
                            v-model.number="pageSize"
                            class="rounded-lg border border-slate-600 bg-slate-700 px-3 py-2"
                        >
                            <option :value="24">24</option>
                            <option :value="48">48</option>
                            <option :value="96">96</option>
                        </select>
                    </label>
                    <span v-if="loading" class="text-yellow-400">正在加载数据...</span>
                    <span v-else-if="filtering" class="text-cyan-300">正在筛选...</span>
                </div>
            </div>
        </div>

        <div v-if="pageItems.length > 0" class="grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
                <div
                    v-for="item in pageItems"
                    :key="item.code"
                    class="group cursor-pointer rounded-xl border border-slate-700 bg-slate-800/70 p-5 transition-colors duration-150 hover:border-blue-500"
                >
                <div class="mb-3 flex items-center justify-between gap-3">
                    <span class="inline-block rounded-full border border-blue-500/30 bg-blue-600/30 px-3 py-1 text-xs font-semibold text-blue-300">
                        {{ item.code }}
                    </span>
                    <span class="inline-block rounded-full border border-purple-500/30 bg-purple-600/30 px-3 py-1 text-xs font-semibold text-purple-300">
                        {{ item.type }}
                    </span>
                </div>

                <div class="relative mb-4 flex h-24 items-center justify-center rounded-lg border border-slate-700 bg-slate-900/60">
                    <span class="text-xs text-slate-500">暂无图片</span>
                    <img
                        :src="getImageUrl(item)"
                        :alt="item.name"
                        loading="lazy"
                        decoding="async"
                        class="absolute max-h-20 max-w-20 object-contain"
                        @error="hideBrokenImage"
                    />
                </div>

                <h3 class="mb-2 truncate text-lg font-semibold text-white transition-colors group-hover:text-blue-400">
                    {{ item.name }}
                </h3>

                    <button
                        @click="copyCode(item)"
                        class="mt-3 flex w-full items-center justify-center gap-2 rounded-lg bg-slate-700 py-2 text-sm font-medium transition-colors duration-150 hover:bg-slate-600"
                    >
                    <span v-if="copiedCode !== item.code">复制代码</span>
                    <span v-else class="text-green-400">已复制</span>
                    </button>
                </div>
        </div>

        <div v-if="totalPages > 1" class="mt-8 flex flex-col gap-4 rounded-2xl border border-slate-700 bg-slate-800/70 p-4 md:flex-row md:items-center md:justify-between">
            <div class="text-sm text-gray-400">
                当前显示第 {{ pageStart }} - {{ pageEnd }} 条
            </div>
            <div class="flex flex-wrap items-center gap-3">
                <button
                    @click="goToPage(currentPage - 1)"
                    :disabled="currentPage === 1 || filtering"
                    class="rounded-lg bg-slate-700 px-4 py-2 transition hover:bg-slate-600 disabled:cursor-not-allowed disabled:opacity-40"
                >
                    上一页
                </button>
                <span class="min-w-24 text-center text-sm text-gray-300">
                    {{ currentPage }} / {{ totalPages }}
                </span>
                <button
                    @click="goToPage(currentPage + 1)"
                    :disabled="currentPage === totalPages || filtering"
                    class="rounded-lg bg-slate-700 px-4 py-2 transition hover:bg-slate-600 disabled:cursor-not-allowed disabled:opacity-40"
                >
                    下一页
                </button>
            </div>
        </div>

        <div v-if="totalFiltered === 0 && !loading" class="py-20 text-center">
            <div class="mb-4 text-6xl">🔍</div>
            <p class="text-xl text-gray-400">未找到匹配的道具</p>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, onBeforeUnmount, watch } = Vue;

        createApp({
            setup() {
                const worker = ref(null);
                const searchText = ref('');
                const selectedType = ref('');
                const types = ref([]);
                const pageItems = ref([]);
                const totalItems = ref(0);
                const totalFiltered = ref(0);
                const currentPage = ref(1);
                const pageSize = ref(48);
                const loading = ref(true);
                const filtering = ref(false);
                const copiedCode = ref('');
                let debounceTimer = null;
                let copyTimer = null;
                let requestId = 0;

                const totalPages = computed(() => Math.max(1, Math.ceil(totalFiltered.value / pageSize.value)));
                const pageStart = computed(() => totalFiltered.value === 0 ? 0 : (currentPage.value - 1) * pageSize.value + 1);
                const pageEnd = computed(() => Math.min(currentPage.value * pageSize.value, totalFiltered.value));

                const runFilter = () => {
                    if (!worker.value) {
                        return;
                    }

                    const nextRequestId = ++requestId;
                    filtering.value = true;
                    worker.value.postMessage({
                        type: 'filter',
                        payload: {
                            requestId: nextRequestId,
                            searchText: searchText.value,
                            selectedType: selectedType.value,
                            page: currentPage.value,
                            pageSize: pageSize.value
                        }
                    });
                };

                const scheduleFilter = () => {
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(() => {
                        currentPage.value = 1;
                        runFilter();
                    }, 180);
                };

                const resetFilters = () => {
                    searchText.value = '';
                    selectedType.value = '';
                    currentPage.value = 1;
                    runFilter();
                };

                const goToPage = (page) => {
                    const nextPage = Math.min(Math.max(page, 1), totalPages.value);
                    if (nextPage === currentPage.value) {
                        return;
                    }

                    currentPage.value = nextPage;
                    runFilter();
                };

                const copyCode = (item) => {
                    navigator.clipboard.writeText(item.code).then(() => {
                        copiedCode.value = item.code;
                        clearTimeout(copyTimer);
                        copyTimer = setTimeout(() => {
                            copiedCode.value = '';
                        }, 2000);
                    });
                };

                const getImageUrl = (item) => `https://iips.speed.qq.com/images/${item.code}.png`;

                const hideBrokenImage = (event) => {
                    event.target.style.display = 'none';
                };

                const loadData = () => {
                    worker.value.postMessage({ type: 'load' });
                };

                watch(pageSize, () => {
                    currentPage.value = 1;
                    runFilter();
                });

                watch(searchText, scheduleFilter);
                watch(selectedType, scheduleFilter);

                onMounted(() => {
                    worker.value = new Worker('./worker.js');
                    worker.value.onmessage = (event) => {
                        const { type, payload } = event.data;

                        if (type === 'loaded') {
                            types.value = payload.types;
                            totalItems.value = payload.totalItems;
                            totalFiltered.value = payload.totalItems;
                            pageItems.value = payload.pageItems;
                            loading.value = false;
                            filtering.value = false;

                            if (searchText.value || selectedType.value || pageSize.value !== 48) {
                                currentPage.value = 1;
                                runFilter();
                            }
                            return;
                        }

                        if (type === 'filtered') {
                            if (payload.requestId !== requestId) {
                                return;
                            }

                            totalFiltered.value = payload.total;
                            pageItems.value = payload.pageItems;
                            currentPage.value = Math.min(payload.page, Math.max(1, payload.totalPages));
                            filtering.value = false;
                        }

                        if (type === 'error') {
                            console.error('加载数据失败:', payload.message);
                            loading.value = false;
                            filtering.value = false;
                        }
                    };

                    loadData();
                });

                onBeforeUnmount(() => {
                    clearTimeout(debounceTimer);
                    clearTimeout(copyTimer);
                    if (worker.value) {
                        worker.value.terminate();
                    }
                });

                return {
                    searchText,
                    selectedType,
                    types,
                    pageItems,
                    totalItems,
                    totalFiltered,
                    currentPage,
                    pageSize,
                    totalPages,
                    pageStart,
                    pageEnd,
                    loading,
                    filtering,
                    copiedCode,
                    resetFilters,
                    goToPage,
                    copyCode,
                    getImageUrl,
                    hideBrokenImage
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
